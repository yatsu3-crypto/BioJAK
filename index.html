<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>皮膚科 バイオ・JAK 参照</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent-atopy: #58a6ff;
    --accent-jak: #3fb950;
    --accent-psoriasis: #d2a8ff;
    --accent-other: #ffa657;
    --accent-danger: #f85149;
    --accent-warn: #d29922;
    --accent-conventional: #79c0ff;
    --radius: 10px;
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ─── Header ─── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 {
    font-size: 15px; font-weight: 700; letter-spacing: .05em;
    white-space: nowrap;
  }
  header h1 span { color: var(--accent-atopy); }

  #search {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent-atopy); }
  #search::placeholder { color: var(--muted); }

  /* ─── Category tabs ─── */
  .tabs {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 10px 16px 0;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    white-space: nowrap;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .tab.active, .tab:hover {
    border-color: currentColor;
    color: var(--text);
  }
  .tab[data-cat="all"].active    { color: var(--text); border-color: var(--text); }
  .tab[data-cat="atopy"].active  { color: var(--accent-atopy); border-color: var(--accent-atopy); background: rgba(88,166,255,.08); }
  .tab[data-cat="jak"].active    { color: var(--accent-jak); border-color: var(--accent-jak); background: rgba(63,185,80,.08); }
  .tab[data-cat="psoriasis"].active { color: var(--accent-psoriasis); border-color: var(--accent-psoriasis); background: rgba(210,168,255,.08); }
  .tab[data-cat="other"].active  { color: var(--accent-other); border-color: var(--accent-other); background: rgba(255,166,87,.08); }
  .tab[data-cat="conventional"].active { color: var(--accent-conventional); border-color: var(--accent-conventional); background: rgba(121,192,255,.08); }

  /* ─── Compare button ─── */
  .toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px;
  }
  .toolbar small { color: var(--muted); font-size: 11px; }
  .btn-compare {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--accent-jak);
    background: rgba(63,185,80,.12);
    color: var(--accent-jak);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-compare:hover { background: rgba(63,185,80,.25); }

  /* ─── Card grid ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    padding: 0 16px 80px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color .2s, transform .1s;
    position: relative;
  }
  .card:hover { transform: translateY(-2px); }
  .card[data-cat="atopy"]     { border-left: 3px solid var(--accent-atopy); }
  .card[data-cat="jak"]       { border-left: 3px solid var(--accent-jak); }
  .card[data-cat="psoriasis"] { border-left: 3px solid var(--accent-psoriasis); }
  .card[data-cat="other"]     { border-left: 3px solid var(--accent-other); }
  .card[data-cat="conventional"] { border-left: 3px solid var(--accent-conventional); }
  .card.open { border-color: var(--accent-atopy); }

  .card-header {
    padding: 12px 14px;
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .card-name { font-size: 16px; font-weight: 700; }
  .card-generic { font-size: 11px; color: var(--muted); margin-top: 1px; font-family: var(--mono); }
  .badge {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 20px;
    white-space: nowrap; margin-top: 2px;
  }
  .badge-atopy     { background: rgba(88,166,255,.15); color: var(--accent-atopy); }
  .badge-jak       { background: rgba(63,185,80,.15); color: var(--accent-jak); }
  .badge-psoriasis { background: rgba(210,168,255,.15); color: var(--accent-psoriasis); }
  .badge-other     { background: rgba(255,166,87,.15); color: var(--accent-other); }
  .badge-conventional { background: rgba(121,192,255,.15); color: var(--accent-conventional); }

  /* indication tags */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 14px 10px; }
  .tag {
    font-size: 10px; padding: 2px 7px;
    background: var(--surface2); border-radius: 4px;
    color: var(--muted); border: 1px solid var(--border);
  }
  .tag.highlight { color: var(--text); border-color: var(--muted); }

  /* expand section */
  .card-body { display: none; border-top: 1px solid var(--border); }
  .card.open .card-body { display: block; }

  .section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 6px;
  }
  .section-content { font-size: 13px; line-height: 1.8; }

  .dose-block {
    background: var(--surface2);
    border-radius: 6px; padding: 8px 10px;
    font-family: var(--mono); font-size: 12px;
    line-height: 1.9;
  }
  .dose-label { color: var(--muted); font-size: 10px; }

  .warn-list { list-style: none; }
  .warn-list li {
    padding: 3px 0;
    display: flex; align-items: baseline; gap: 6px;
    font-size: 12.5px;
  }
  .warn-list li::before { content: "⚠"; font-size: 11px; color: var(--accent-warn); flex-shrink: 0; }
  .danger-list li::before { content: "✕"; font-size: 11px; color: var(--accent-danger); }

  .monitor-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
  }
  .monitor-item {
    background: var(--surface2); border-radius: 6px;
    padding: 6px 8px; font-size: 11.5px;
  }
  .monitor-item .mi-label { color: var(--muted); font-size: 10px; margin-bottom: 1px; }

  .ae-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12.5px; border-bottom: 1px solid var(--border); }
  .ae-row:last-child { border: none; }
  .ae-freq { font-family: var(--mono); font-size: 11px; color: var(--accent-atopy); }

  /* ─── Comparison modal ─── */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 200;
    overflow-y: auto; padding: 20px 10px;
  }
  .modal-bg.show { display: block; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    max-width: 900px; margin: 0 auto;
    padding: 20px;
  }
  .modal h2 { font-size: 16px; margin-bottom: 14px; }
  .modal-close {
    float: right; background: none; border: none;
    color: var(--muted); font-size: 20px; cursor: pointer;
  }
  .compare-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
  }
  .compare-table th, .compare-table td {
    border: 1px solid var(--border);
    padding: 7px 10px; text-align: left; vertical-align: top;
  }
  .compare-table th { background: var(--surface2); font-weight: 600; font-size: 11px; color: var(--muted); }
  .compare-table td:first-child { font-weight: 600; color: var(--text); }
  .compare-table tr:hover td { background: rgba(255,255,255,.02); }
</style>
</head>
<body>

<header>
  <h1>皮膚科<span>Bio/JAK</span></h1>
  <input id="search" type="search" placeholder="薬剤名・成分名・適応で検索…">

// ─── Render ───
function catColor(cat) {
  return { atopy: 'accent-atopy', jak: 'accent-jak', psoriasis: 'accent-psoriasis', other: 'accent-other' }[cat] || 'text';
}

function renderCards(drugs) {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = `${drugs.length} 件`;
  grid.innerHTML = '';
  drugs.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.cat = d.cat;
    card.dataset.id = d.id;
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard('${d.id}')">
        <div>
          <div class="card-name">${d.name}</div>
          <div class="card-generic">${d.generic}</div>
        </div>
        <span class="badge badge-${d.cat}">${d.badge}</span>
      </div>
      <div class="tags">
        ${d.tags.map((t,i)=>`<span class="tag${i===0?' highlight':''}">${t}</span>`).join('')}
      </div>
      <div class="card-body" id="body-${d.id}">
        <!-- 作用機序 -->
        <div class="section">
          <div class="section-title">⚙ 作用機序</div>
          <div class="section-content">${d.mechanism}</div>
        </div>
        <!-- 用法・用量 -->
        <div class="section">
          <div class="section-title">💉 用法・用量</div>
          <div class="dose-block">${d.dose.join('<br>')}</div>
        </div>
        <!-- 禁忌 -->
        <div class="section">
          <div class="section-title">🚫 禁忌</div>
          <ul class="warn-list danger-list">
            ${d.contraindication.map(c=>`<li>${c}</li>`).join('')}
          </ul>
        </div>
        <!-- 注意事項 -->
        <div class="section">
          <div class="section-title">⚠ 主な注意事項</div>
          <ul class="warn-list">
            ${d.caution.map(c=>`<li>${c}</li>`).join('')}
          </ul>
        </div>
        <!-- 副作用 -->
        <div class="section">
          <div class="section-title">📋 副作用プロファイル</div>
          ${d.ae.map(a=>`<div class="ae-row"><span>${a.name}<span style="color:var(--muted);font-size:10px;margin-left:6px">${a.severity}</span></span><span class="ae-freq">${a.freq}</span></div>`).join('')}
        </div>
        <!-- モニタリング -->
        <div class="section">
          <div class="section-title">🔬 検査値モニタリング</div>
          <div class="monitor-grid">
            ${d.monitor.map(m=>`<div class="monitor-item"><div class="mi-label">${m.label}</div><div style="font-size:11px">${m.timing}</div></div>`).join('')}
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function toggleCard(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  card.classList.toggle('open');
}

// ─── Filter ───
let currentCat = 'all';
let currentQuery = '';

function filterDrugs() {
  let list = DRUGS;
  if (currentCat !== 'all') list = list.filter(d => d.cat === currentCat);
  if (currentQuery) {
    const q = currentQuery.toLowerCase();
    list = list.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.generic.toLowerCase().includes(q) ||
      d.tags.some(t => t.includes(q)) ||
      d.mechanism.toLowerCase().includes(q)
    );
  }
  renderCards(list);
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    filterDrugs();
  });
});

document.getElementById('search').addEventListener('input', e => {
  currentQuery = e.target.value;
  filterDrugs();
});

// ─── Compare Table ───
function openCompare() {
  const cols = ['薬剤名', '分類', '機序', '効果発現', '投与経路', '投与頻度', '対象年齢', '妊婦', '感染注意点'];
  const rows = DRUGS.map(d => [
    `<strong>${d.name}</strong><br><span style="font-size:10px;color:var(--muted)">${d.generic}</span>`,
    `<span class="badge badge-${d.cat}">${d.badge}</span>`,
    d.compare.biologicType,
    d.compare.onset,
    d.compare.route,
    d.compare.freq,
    d.compare.age,
    d.compare.pregnancy,
    d.compare.infection,
  ]);
  const table = document.getElementById('compareTable');
  table.innerHTML = `
    <tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>
    ${rows.map(r=>`<tr>${r.map((c,i)=>`<td>${c}</td>`).join('')}</tr>`).join('')}
  `;
  document.getElementById('modalBg').classList.add('show');
}
function closeCompare() {
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeCompare();
});

// init
renderCards(DRUGS);
</script>
